name: Atualizacao Diaria IFMS
on:
  schedule:
    - cron: '0 3 * * *' # Roda às 03:00 da manhã (horário UTC)
  workflow_dispatch:   # Botão para rodar manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v3

      - name: Configurar Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar Dependencias
        run: pip install requests pandas pyarrow

      - name: 🚀 Executar Esteira de Dados
        run: |
          # Extração dos dados
          python extrator_atas.py || true
          python extrator_atas_itens_saldos_unidadesParticipantes.py || true
          python extrator_compras.py || true
          python extrator_compras_itens.py || true
          
          # Geração das bases de dados
          python gerar_banco_compras_consolidado.py || true
          python gerar_banco_atas_consolidado.py || true

      - name: 💾 Salvar Bases e Cache no GitHub
        run: |
          git config --global user.name 'Michell-Bot'
          git config --global user.email 'tingolopes@gmail.com'
          git add *.csv temp_*/
          git commit -m "Auto-update: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push